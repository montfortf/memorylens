<form method="post" action="/api/share" class="inline">
    <input type="hidden" name="link_type" value="{{ share_type }}">
    <input type="hidden" name="target" value="{{ share_target }}">
    <button type="submit"
        class="px-3 py-1.5 rounded-md bg-white/[0.05] border border-white/[0.1] text-xs text-white/50 hover:text-white/70 hover:bg-white/[0.08]">
        Share Link
    </button>
</form>
